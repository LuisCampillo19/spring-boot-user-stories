<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <th:block th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' | Eventify Admin'">Eventify Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>
    <style>
      body { background-color: #f8f9fa; }
      .navbar-brand { font-weight: 700; letter-spacing: .5px; }
      .table-hover tbody tr:hover { background-color: #eef2ff; }
      .badge-empty { font-size: .95rem; padding: .6rem 1rem; }
    </style>
  </th:block>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm" th:fragment="navbar">
  <div class="container">
    <a class="navbar-brand" th:href="@{/admin/events}">
      <i class="bi bi-calendar-event-fill me-2"></i>Eventify Admin
    </a>
    <div class="navbar-nav ms-auto flex-row gap-3">
      <a class="nav-link" th:href="@{/admin/events}"
         th:classappend="${#request.requestURI.contains('/admin/events')} ? 'active fw-semibold' : ''">
        <i class="bi bi-calendar3 me-1"></i>Eventos
      </a>
      <a class="nav-link" th:href="@{/admin/venues}"
         th:classappend="${#request.requestURI.contains('/admin/venues')} ? 'active fw-semibold' : ''">
        <i class="bi bi-geo-alt me-1"></i>Lugares
      </a>
    </div>
  </div>
</nav>

<footer class="text-center text-muted py-3 mt-5 border-top small" th:fragment="footer">
  Eventify Admin &copy; 2026
</footer>

</body>
</html>
