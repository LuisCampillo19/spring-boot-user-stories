<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <th:block th:replace="~{fragments/layout :: head('Nuevo Lugar')}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="bi bi-geo-alt-fill me-2"></i>Registrar Lugar</h5>
        </div>
        <div class="card-body">
          <form th:action="@{/admin/venues}" th:object="${venue}" method="post">

            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre del lugar</label>
              <input type="text" class="form-control" id="nombre"
                     th:field="*{nombre}" placeholder="Ej. Teatro Metropolitano" required/>
            </div>

            <div class="mb-3">
              <label for="direccion" class="form-label fw-semibold">Dirección</label>
              <input type="text" class="form-control" id="direccion"
                     th:field="*{direccion}"
                     placeholder="Ej. Calle 41 N° 57-30, Medellín" required/>
            </div>

            <div class="mb-4">
              <label for="capacidad" class="form-label fw-semibold">Capacidad (personas)</label>
              <input type="number" class="form-control" id="capacidad"
                     th:field="*{capacidad}" min="1" placeholder="Ej. 500" required/>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-1"></i>Guardar
              </button>
              <a th:href="@{/admin/venues}" class="btn btn-outline-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
