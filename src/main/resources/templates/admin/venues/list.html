<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <th:block th:replace="~{fragments/layout :: head('Lugares')}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0">
      <i class="bi bi-geo-alt me-2 text-primary"></i>Catálogo de Lugares
    </h2>
    <a th:href="@{/admin/venues/new}" class="btn btn-primary">
      <i class="bi bi-plus-circle me-1"></i>Nuevo Lugar
    </a>
  </div>

  <!-- Escenario 2: Catálogo vacío -->
  <div th:if="${#lists.isEmpty(venues)}"
       class="alert alert-info d-flex align-items-center gap-2 badge-empty" role="alert">
    <i class="bi bi-info-circle-fill fs-5"></i>
    <span>Actualmente no hay lugares registrados.</span>
  </div>

  <!-- Escenario 1: Tabla con th:each -->
  <div th:unless="${#lists.isEmpty(venues)}" class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover table-striped mb-0">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Capacidad</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="venue : ${venues}">
            <td th:text="${venue.id}">1</td>
            <td th:text="${venue.nombre}">Teatro</td>
            <td th:text="${venue.direccion}">Calle 10</td>
            <td>
              <span class="badge bg-secondary"
                    th:text="${venue.capacidad} + ' personas'">200 personas</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="card-footer text-muted small">
      Total: <span th:text="${#lists.size(venues)}">0</span> lugar(es) registrado(s).
    </div>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
