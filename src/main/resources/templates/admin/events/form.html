<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <th:block th:replace="~{fragments/layout :: head('Nuevo Evento')}"/>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="bi bi-calendar-plus me-2"></i>Registrar Evento</h5>
        </div>
        <div class="card-body">
          <!-- Escenario 3: th:action + th:object para binding -->
          <form th:action="@{/admin/events}" th:object="${event}" method="post">

            <div class="mb-3">
              <label for="nombre" class="form-label fw-semibold">Nombre del evento</label>
              <input type="text" class="form-control" id="nombre"
                     th:field="*{nombre}" placeholder="Ej. Concierto de Jazz" required/>
            </div>

            <div class="mb-3">
              <label for="fecha" class="form-label fw-semibold">Fecha</label>
              <input type="date" class="form-control" id="fecha"
                     th:field="*{fecha}" required/>
            </div>

            <div class="mb-4">
              <label for="descripcion" class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" id="descripcion" rows="3"
                        th:field="*{descripcion}"
                        placeholder="Descripción del evento (opcional)"></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-1"></i>Guardar
              </button>
              <a th:href="@{/admin/events}" class="btn btn-outline-secondary">Cancelar</a>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
